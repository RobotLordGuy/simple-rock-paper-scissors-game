<!DOCTYPE html>
<html>
    <head>
        <title>Rock Paper Scissors</title>
        <link rel="stylesheet" href="styles.css">
    </head>
    <body>
        <div class="title-container">
            <p class="game-title">ROCK PAPER SCISSORS</p>
        </div>
        
        <div class="player-move-buttons-container">
            <button class="rock-button js-rock-button">
                <img class="move-image" src="images/rock.png" alt="Rock">
            </button>
            <button class="paper-button js-paper-button">
                <img class="move-image" src="images/paper.png" alt="Paper">
            </button>
            <button class="scissors-button js-scissors-button">
                <img class="move-image" src="images/scissors.png" alt="Scissors">
            </button>
        </div>

        <div class="bot-move-buttons-container">
            <button class="rock-button js-bot-rock-button">
                <img class="move-image" src="images/rock.png" alt="Rock">
            </button>
            <button class="paper-button js-bot-paper-button">
                <img class="move-image" src="images/paper.png" alt="Paper">
            </button>
            <button class="scissors-button js-bot-scissors-button">
                <img class="move-image" src="images/scissors.png" alt="Scissors">
            </button>
        </div>
        
        <div class="winner-container">
            <p class="winner-text js-winner-text"></p>
        </div>
        <button class="new-game js-new-game">NEW GAME</button>

        <script type="module" src="script.js"></script>
    </body>
</html>
